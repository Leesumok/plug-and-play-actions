name: Issue Comment - Claude Auto Response

on:
  issue_comment:
    types: [created]

jobs:
  respond:
    # 봇 자신의 comment에는 반응하지 않음 (무한루프 방지)
    if: |
      !github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Respond to comment with Claude
        uses: anthropics/claude-code-action@v1
        with:
          # OAuth Token(Pro/Max) 또는 API Key 중 설정된 것을 사용
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(gh issue edit:*)",
                  "Bash(gh issue view:*)"
                ]
              }
            }
          claude_args: |
            --append-system-prompt "당신은 이 레포지토리의 AI 어시스턴트입니다. issue comment를 분석해 적절히 행동하세요. comment가 issue 요구사항을 명확히 하거나 수정하는 내용이면 issue 본문을 업데이트하고 변경 내용을 답글로 알리세요. 내용이 불명확하거나 추가 정보가 필요하면 구체적인 질문을 답글로 작성하세요. 감사 인사나 단순 확인이면 간단히 응답하세요. 항상 한국어로 간결하게 답하세요."
